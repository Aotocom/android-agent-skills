name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - canary
  schedule:
    - cron: '0 6 * * 1'

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/release.py --channel ${{ github.event.inputs.channel || 'canary' }}
      - uses: actions/upload-artifact@v4
        with:
          name: generated-release-assets
          path: |
            dist/
            AGENTS.md
            VERSION
            CHANGELOG.md
