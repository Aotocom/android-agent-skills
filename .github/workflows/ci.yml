name: CI

on:
  push:
    branches: [main, canary]
  pull_request:
  workflow_dispatch:

jobs:
  repo-validation:
    name: repo-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/build_adapters.py --agent all
      - run: python3 scripts/validate_repo.py
      - run: python3 scripts/eval_triggers.py

  packaging-smoke:
    name: packaging-smoke (${{ matrix.os }}, ${{ matrix.agent }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        agent: [codex, claude, cursor]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - if: runner.os != 'Windows'
        run: |
          mkdir packaging-smoke
          cd packaging-smoke
          "$GITHUB_WORKSPACE/scripts/install.sh" --agent ${{ matrix.agent }} --scope project --skill all
      - if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force packaging-smoke | Out-Null
          Set-Location packaging-smoke
          & (Join-Path $env:GITHUB_WORKSPACE 'scripts/install.ps1') -agent ${{ matrix.agent }} -scope project -skill all

  android-fixtures:
    name: android-fixtures (${{ matrix.fixture }}, api-${{ matrix.api-level }})
    strategy:
      fail-fast: false
      matrix:
        fixture: [orbittasks-compose, orbittasks-xml]
        api-level: [26, 30, 34]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: android-actions/setup-android@v3
      - name: Build, unit, and lint checks
        run: |
          cd examples/${{ matrix.fixture }}
          ./gradlew :app:assembleDebug :app:testDebugUnitTest :app:lintDebug
      - name: Instrumentation
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: >-
            cd examples/${{ matrix.fixture }} &&
            adb wait-for-device &&
            until [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]; do sleep 5; done &&
            adb shell getprop ro.build.version.sdk &&
            ./gradlew --no-daemon :app:connectedDebugAndroidTest
